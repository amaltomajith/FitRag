# nixpacks.toml — repo root
# Nix's Python is externally managed, so we must create a venv first.

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r backend/requirements.txt"
]

[start]
cmd = "cd backend && /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
